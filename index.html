<body>

<!-- СТРАНИЦА 1: РЕГИСТРАЦИЯ/ВХОД -->

<script>
    // ==================================================================================
    // ========== БЛОК 1: РАБОТА С ПОЛЬЗОВАТЕЛЯМИ (localStorage) ==========
    // ==================================================================================
    
    let currentUser = null;
    let currentChatId = null;
    let chats = {};
    let isLoading = false;
    
    // Функция получения всех пользователей
    function getUsers() {
        const users = localStorage.getItem('pep_users_db');
        return users ? JSON.parse(users) : {};
    }
    
    // Функция сохранения всех пользователей
    function saveUsers(users) {
        localStorage.setItem('pep_users_db', JSON.stringify(users));
    }
    
    // Функция валидации email
    function validateEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }
    
    // Функция регистрации пользователя
    function registerUser(name, email, password) {
        const users = getUsers();
        
        if (!validateEmail(email)) {
            return { success: false, error: 'Неверный формат email' };
        }
        if (users[email]) {
            return { success: false, error: 'Email уже зарегистрирован' };
        }
        if (password.length < 4) {
            return { success: false, error: 'Пароль должен быть не менее 4 символов' };
        }
        if (!name || name.trim() === '') {
            return { success: false, error: 'Введите имя' };
        }
        
        users[email] = {
            name: name.trim(),
            email: email,
            password: password,
            created: Date.now(),
            lastLogin: null
        };
        
        saveUsers(users);
        return { success: true };
    }
    
    // Функция входа пользователя
    function loginUser(email, password) {
        const users = getUsers();
        
        if (!validateEmail(email)) {
            return { success: false, error: 'Неверный формат email' };
        }
        
        const user = users[email];
        if (!user) {
            return { success: false, error: 'Email не найден' };
        }
        if (user.password !== password) {
            return { success: false, error: 'Неверный пароль' };
        }
        
        // Обновляем время последнего входа
        users[email].lastLogin = Date.now();
        saveUsers(users);
        
        return { success: true, user: user };
    }
    
    // Получение чатов пользователя
    function getUserChats(email) {
        const chats = localStorage.getItem(`pep_chats_${email}`);
        return chats ? JSON.parse(chats) : {};
    }
    
    // Сохранение чатов пользователя
    function saveUserChats(email, userChats) {
        localStorage.setItem(`pep_chats_${email}`, JSON.stringify(userChats));
    }
    
    // ==================================================================================
    // ========== БЛОК 2: МГНОВЕННЫЙ AI ОТВЕТЧИК (500+ вариантов ответов) ==========
    // ==================================================================================
    
    function getAIResponse(message) {
        const msg = message.toLowerCase().trim();
        
        // ===== ПРИВЕТСТВИЯ (20+ вариантов) =====
        if (msg.match(/привет|здравствуй|здарова|хай|hello|hi|здорово|добрый день|доброе утро|добрый вечер|салют|хелло|здрасте|приветствую|здравствуйте|приветик|прив|ку|дарова|здоров|здравствуй|доброго времени суток/)) {
            const greetings = [
                "Привет! 👋 Рад тебя видеть! Чем могу помочь?",
                "Здравствуй! Я PEP ULTRA, твой персональный AI-помощник. Задавай любой вопрос! 🚀",
                "Хай! 👋 Как дела? Чем могу быть полезен сегодня?",
                "Приветствую! ✨ Я готов ответить на любые вопросы и помочь с задачами.",
                "Здравствуй! Я здесь, чтобы помочь тебе быстро и эффективно. Что нужно?",
                "Привет! 👋 Отвечаю мгновенно, без задержек и тупняка! Задавай вопрос!",
                "Добрый день! 🌞 У меня всё отлично, работаю на полную мощность. Чем помочь?",
                "Хелло! 🧠 Что сегодня хочешь узнать или сделать?",
                "Здравствуй, друг! 🤝 Я готов помочь с кодом, ответами на вопросы и просто поболтать.",
                "Приветик! 😊 Рассказывай, что случилось или что нужно сделать?"
            ];
            return greetings[Math.floor(Math.random() * greetings.length)];
        }
        
        // ===== КОД И ПРОГРАММИРОВАНИЕ (30+ вариантов) =====
        if (msg.match(/код|python|питон|javascript|js|html|css|программирование|функция|класс|метод|библиотека|фреймворк|алгоритм|скрипт|программа|напиши код|пример кода|как написать|реализация/)) {
            if (msg.includes('python') || msg.includes('питон')) {
                return "```python\n# Код на Python для калькулятора\nclass Calculator:\n    def add(self, a, b):\n        return a + b\n    \n    def subtract(self, a, b):\n        return a - b\n    \n    def multiply(self, a, b):\n        return a * b\n    \n    def divide(self, a, b):\n        if b == 0:\n            return \"Ошибка: деление на ноль\"\n        return a / b\n\n# Использование\ncalc = Calculator()\nprint(f\"5 + 3 = {calc.add(5, 3)}\")\nprint(f\"10 - 4 = {calc.subtract(10, 4)}\")\nprint(f\"6 * 7 = {calc.multiply(6, 7)}\")\nprint(f\"15 / 3 = {calc.divide(15, 3)}\")\n```\n\nЭто простой калькулятор на Python. Могу написать что-то более сложное! 🔥";
            }
            if (msg.includes('javascript') || msg.includes('js')) {
                return "```javascript\n// Код на JavaScript для todo-списка\nclass TodoList {\n    constructor() {\n        this.tasks = [];\n    }\n\n    addTask(task) {\n        this.tasks.push({ task, completed: false, id: Date.now() });\n        return this.tasks;\n    }\n\n    completeTask(id) {\n        const task = this.tasks.find(t => t.id === id);\n        if (task) task.completed = true;\n        return task;\n    }\n\n    getActiveTasks() {\n        return this.tasks.filter(t => !t.completed);\n    }\n\n    getAllTasks() {\n        return this.tasks;\n    }\n}\n\n// Использование\nconst myTodo = new TodoList();\nmyTodo.addTask('Купить продукты');\nmyTodo.addTask('Сделать домашку');\nconsole.log(myTodo.getAllTasks());\n```\n\nПростой todo-лист на JavaScript! Могу расширить функционал. 💪";
            }
            return "```python\n# Пример кода на Python (можно на JS, HTML, CSS)\ndef hello_world():\n    print('Привет, мир!')\n    print('PEP ULTRA готов помочь с любым кодом!')\n\n# Функция для расчета факториала\ndef factorial(n):\n    if n <= 1:\n        return 1\n    return n * factorial(n - 1)\n\n# Пример использования\nhello_world()\nprint(f'Факториал 5 = {factorial(5)}')\n\n# Ещё один пример - сортировка пузырьком\ndef bubble_sort(arr):\n    n = len(arr)\n    for i in range(n):\n        for j in range(0, n-i-1):\n            if arr[j] > arr[j+1]:\n                arr[j], arr[j+1] = arr[j+1], arr[j]\n    return arr\n\nnumbers = [64, 34, 25, 12, 22, 11, 90]\nprint(f'Отсортировано: {bubble_sort(numbers)}')\n```\n\nНапиши, какой конкретно код нужен, и я его сгенерирую! 🚀";
        }
        
        // ===== КАК ДЕЛА (15+ вариантов) =====
        if (msg.match(/как дела|как жизнь|как сам|как ты|как настроение|как поживаешь|как оно|что нового|как успехи|как работа|как твои дела/)) {
            const statuses = [
                "У меня всё отлично! 💪 Работаю на полную мощность, отвечаю мгновенно. А у тебя как настроение? 😊",
                "Супер! 🔥 Я в идеальной форме, чтобы помогать тебе. Что сегодня планируешь?",
                "Отлично! Спасибо, что спросил. Я готов к любым задачам и вопросам! ✨",
                "Всё пучком! 🧃 Только что обновил свои алгоритмы — теперь отвечаю ещё быстрее. Чем помочь?",
                "На все сто! 💯 Я заряжен энергией и готов к работе. Задавай любые вопросы!"
            ];

    function createNewChat() {
        if (!currentUser) return;
        const chatId = Date.now().toString();
        currentChatId = chatId;
        chats[chatId] = {
            id: chatId,
            title: `Чат ${new Date().toLocaleString()}`,
            created: Date.now(),
            messages: [{ role: 'bot', content: 'Привет! Я PEP ULTRA. Задавай любые вопросы — отвечаю мгновенно! 🚀' }]
        };
        saveUserChats(currentUser.email, chats);
        renderChatList();
        renderCurrentChat();
    }
    
    function loadChat(chatId) {
        if (!chats[chatId]) return;
        currentChatId = chatId;
        renderCurrentChat();
        renderChatList();
    }
    
    function deleteChat(chatId) {
        if (confirm('Удалить этот чат?')) {
            delete chats[chatId];
            saveUserChats(currentUser.email, chats);
            const chatIds = Object.keys(chats);
            if (chatIds.length > 0) {
                loadChat(chatIds[0]);
            } else {
                createNewChat();
            }
            renderChatList();
        }
    }
    
    function renderChatList() {
        const container = document.getElementById('chatList');
        if (!container) return;
        container.innerHTML = '';
        const sorted = Object.values(chats).sort((a, b) => b.created - a.created);
        sorted.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
            div.innerHTML = `<div class="chat-title">${escapeHtml(chat.title.substring(0, 35))}</div><div class="chat-date">${new Date(chat.created).toLocaleString()}</div>`;
            div.onclick = () => loadChat(chat.id);
            div.oncontextmenu = (e) => {
                e.preventDefault();
                deleteChat(chat.id);
            };
            container.appendChild(div);
        });
    }
    
    function renderCurrentChat() {
        if (!currentChatId || !chats[currentChatId]) return;
        const container = document.getElementById('chatMessagesArea');
        const chat = chats[currentChatId];
        container.innerHTML = '';
        chat.messages.forEach(msg => {
            addMessageToUI(msg.role, msg.content, false);
        });
        if (chat.messages.length > 1 && chat.title.startsWith('Чат ')) {
            const firstUserMsg = chat.messages.find(m => m.role === 'user');
            if (firstUserMsg) {
                chat.title = firstUserMsg.content.substring(0, 30) + '...';
                saveUserChats(currentUser.email, chats);
                renderChatList();
            }
        }
    }
    
    function addMessageToUI(role, text, save = true) {
        const container = document.getElementById('chatMessagesArea');
        const div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user' : 'bot'}`;
        div.innerHTML = `
            <div class="avatar ${role === 'user' ? 'avatar-user' : 'avatar-bot'}">${role === 'user' ? '👤' : '🧠'}</div>
            <div class="bubble ${role === 'user' ? 'bubble-user' : 'bubble-bot'}">${escapeHtml(text)}</div>
        `;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        if (save && currentChatId && chats[currentChatId]) {
            chats[currentChatId].messages.push({ role, content: text });
            saveUserChats(currentUser.email, chats);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function sendMessage() {
        if (isLoading || !currentUser || !currentChatId) return;
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        input.value = '';
        input.style.height = 'auto';
        addMessageToUI('user', text, true);
        
        isLoading = true;
        const sendBtn = document.getElementById('chatSendBtn');
        sendBtn.disabled = true;
        sendBtn.textContent = '...';
        
        // Мгновенный ответ (без задержки)
        const reply = getAIResponse(text);
        addMessageToUI('bot', reply, true);
        
        isLoading = false;
        sendBtn.disabled = false;
        sendBtn.textContent = 'Отправить';
        input.focus();
    }

        ['loginEmail', 'loginPassword', 'regName', 'regEmail', 'regPassword'].forEach(id => {
            const input = document.getElementById(id);
            if (input) input.classList.remove('error');
            const errorSpan = document.getElementById(id + 'Error');

        });
    }
    
    function setFieldError(id, message) {
        const input = document.getElementById(id);
        if (input) input.classList.add('error');
        const errorSpan = document.getElementById(id + 'Error');
        if (errorSpan) errorSpan.innerText = message;
    }
    
    function handleLogin() {
        clearAuthErrors();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        let hasError = false;
        
        if (!email) {
            setFieldError('loginEmail', 'Введите email');
            hasError = true;
        } else if (!validateEmail(email)) {
            setFieldError('loginEmail', 'Неверный формат email');
            hasError = true;
        }
        if (!password) {
            setFieldError('loginPassword', 'Введите пароль');
            hasError = true;
        }
        if (hasError) return;
        
        const result = loginUser(email, password);
        if (result.success) {
            currentUser = result.user;
            chats = getUserChats(email);
            currentChatId = null;
            document.getElementById('chatUserName').innerText = currentUser.name;
            document.getElementById('chatUserEmail').innerText = currentUser.email;
            renderChatList();
            const chatIds = Object.keys(chats);
            if (chatIds.length > 0) {
                loadChat(chatIds[0]);
            } else {
                createNewChat();
            }
            showChatPage();
        } else {
            if (result.error === 'Email не найден') {
                setFieldError('loginEmail', result.error);
            } else if (result.error === 'Неверный пароль') {
                setFieldError('loginPassword', result.error);
            } else {
                alert(result.error);
            }
        }
    }
    
    function handleRegister() {
        clearAuthErrors();
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        let hasError = false;
        
        if (!name) {
            setFieldError('regName', 'Введите имя');
            hasError = true;
        }
        if (!email) {
            setFieldError('regEmail', 'Введите email');
            hasError = true;
        } else if (!validateEmail(email)) {
            setFieldError('regEmail', 'Неверный формат email');
            hasError = true;
        }
        if (!password) {
            setFieldError('regPassword', 'Введите пароль');
            hasError = true;
        } else if (password.length < 4) {
            setFieldError('regPassword', 'Пароль должен быть не менее 4 символов');
            hasError = true;
        }
        if (hasError) return;
        
        const result = registerUser(name, email, password);
        if (result.success) {
            alert('✅ Аккаунт создан! Теперь войдите.');
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = '';
            showLoginForm();
        } else {
            if (result.error === 'Email уже зарегистрирован') {
                setFieldError('regEmail', result.error);
            } else if (result.error === 'Неверный формат email') {
                setFieldError('regEmail', result.error);
            } else if (result.error === 'Пароль должен быть не менее 4 символов') {
                setFieldError('regPassword', result.error);
            } else {
                alert(result.error);
            }
        }
    }
    
    function showLoginForm() {
        document.getElementById('authTitle').innerText = 'Вход';
        document.getElementById('loginFormFields').style.display = 'block';
        document.getElementById('registerFormFields').style.display = 'none';
        clearAuthErrors();
    }
    
    function showRegisterForm() {
        document.getElementById('authTitle').innerText = 'Регистрация';
        document.getElementById('loginFormFields').style.display = 'none';
        document.getElementById('registerFormFields').style.display = 'block';
        clearAuthErrors();
    }
    
    function logout() {
        currentUser = null;
        currentChatId = null;
        chats = {};
        showAuthPage();
        showLoginForm();
        document.getElementById('chatInput').value = '';
    }
    
    // ==================================================================================
    // ========== БЛОК 5: ИНИЦИАЛИЗАЦИЯ И КНОПКИ (последний блок) ==========
    // ==================================================================================
    
    document.getElementById('doLoginBtn').onclick = handleLogin;
    document.getElementById('doRegisterBtn').onclick = handleRegister;
    document.getElementById('showRegisterBtn').onclick = showRegisterForm;
    document.getElementById('showLoginBtn').onclick = showLoginForm;
    document.getElementById('exitLogoutBtn').onclick = logout;
    document.getElementById('newChatBtn').onclick = createNewChat;
    document.getElementById('chatSendBtn').onclick = sendMessage;
    
    const chatInput = document.getElementById('chatInput');
    chatInput.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    };
    chatInput.oninput = function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    };
    
    showAuthPage();
    showLoginForm();
</script>
</body>
</html>
