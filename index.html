<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pep AI — Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            color: #1a1a2e;
        }

        /* Страница регистрации (полный экран) */
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 3px solid #667eea;
        }

        .auth-logo h1 {
            font-size: 2rem;
            color: #1a1a2e;
        }

        .auth-logo p {
            color: #868e96;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
            color: #1a1a2e;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .form-input.error {
            border-color: #e03131;
            background: #fff5f5;
        }

        .error-text {
            color: #e03131;
            font-size: 0.7rem;
            margin-top: 6px;
            display: block;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102,126,234,0.4);
        }

        .switch-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #868e96;
            cursor: pointer;
        }

        .switch-link span {
            color: #667eea;
            font-weight: 600;
        }

        /* Страница чата (скрыта по умолчанию) */
        .chat-page {
            display: none;
            height: 100vh;
            width: 100%;
            background: #f5f7fb;
        }

        .chat-container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* Сайдбар */
        .sidebar {
            width: 300px;
            background: #ffffff;
            border-right: 1px solid #e8ecf0;
            display: flex;
            flex-direction: column;
        }

        .logo-area {
            padding: 24px 20px;
            border-bottom: 1px solid #eef2f6;
            text-align: center;
        }

        .logo-area-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .logo-area h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .user-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin: 16px;
        }

        .user-name {
            font-weight: 700;
            font-size: 1rem;
            color: #1a1a2e;
        }

        .user-email {
            font-size: 0.7rem;
            color: #868e96;
            margin-top: 4px;
        }

        .new-chat-btn, .logout-btn {
            margin: 0 16px 12px 16px;
            width: calc(100% - 32px);
        }

        .new-chat-btn {
            background: #f1f3f5;
            color: #1a1a2e;
        }

        .logout-btn {
            background: #fff5f5;
            color: #e03131;
            border: 1px solid #ffe3e3;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            background: #f8f9fa;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-item:hover {
            background: #f1f3f5;
        }

        .chat-item.active {
            background: #e3f2fd;
            border-left: 3px solid #667eea;
        }

        .chat-title {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .chat-date {
            font-size: 0.65rem;
            color: #adb5bd;
            margin-top: 4px;
        }

        /* Основной чат */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #eef2f6;
        }

        .model-badge {
            display: inline-block;
            padding: 6px 14px;
            background: #e3f2fd;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #667eea;
            font-weight: 500;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .avatar-user {
            background: #1a1a2e;
            color: white;
        }

        .avatar-bot {
            background: #e9ecef;
            color: #495057;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 70%;
            line-height: 1.45;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .bubble-user {
            background: #1a1a2e;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bubble-bot {
            background: #f1f3f5;
            color: #212529;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 8px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typingAnim 1.4s infinite;
        }
        @keyframes typingAnim {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        .input-area {
            padding: 16px 24px 24px 24px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 24px;
            padding: 12px 18px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            max-height: 120px;
        }

        .message-input:focus {
            border-color: #667eea;
            background: #ffffff;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 12px 24px;
            border-radius: 24px;
            width: auto;
        }

        .status-bar {
            padding: 8px 24px;
            background: #f8f9fa;
            border-top: 1px solid #eef2f6;
            font-size: 0.65rem;
            color: #868e96;
            text-align: center;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 260px;
            }
            .bubble {
                max-width: 85%;
            }
            .auth-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>

                <h2>pep</h2>
            </div>
            <div class="user-card">
                <div class="user-name" id="chatUserName"></div>
                <div class="user-email" id="chatUserEmail"></div>
            </div>
            <button id="newChatBtn" class="btn new-chat-btn">+ Новый чат</button>
            <button id="exitLogoutBtn" class="btn logout-btn">Выйти</button>
            <div class="chat-list" id="chatList"></div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <div class="model-badge">🧠 Pep AI • работает онлайн</div>
            </div>
            <div class="messages-area" id="chatMessagesArea">
                <div class="message bot">
                    <div class="avatar avatar-bot">🧠</div>
                    <div class="bubble bubble-bot">Добро пожаловать! Чем могу помочь?</div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chatInput" class="message-input" rows="1" placeholder="Напиши сообщение..."></textarea>
                    <button id="chatSendBtn" class="btn send-btn">Отправить</button>
                </div>
            </div>
            <div class="status-bar">🟢 Готов к работе</div>
        </div>
    </div>
</div>

<script>
    // ========== ДАННЫЕ ПОЛЬЗОВАТЕЛЕЙ ==========
    let currentUser = null;
    let currentChatId = null;
    let chats = {};
    let isLoading = false;
    
    function getUsers() { const u = localStorage.getItem('pep_users_db'); return u ? JSON.parse(u) : {}; }
    function saveUsers(u) { localStorage.setItem('pep_users_db', JSON.stringify(u)); }
    
    function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
    
    function registerUser(name, email, password) {
        const users = getUsers();
        if (!validateEmail(email)) return { success: false, error: 'Неверный формат email' };
        if (users[email]) return { success: false, error: 'Email уже зарегистрирован' };
        if (password.length < 4) return { success: false, error: 'Пароль должен быть не менее 4 символов' };
        if (!name.trim()) return { success: false, error: 'Введите имя' };
        
        users[email] = { name: name.trim(), email, password, created: Date.now() };
        saveUsers(users);
        return { success: true };
    }
    
    function loginUser(email, password) {
        const users = getUsers();
        if (!validateEmail(email)) return { success: false, error: 'Неверный формат email' };
        const user = users[email];
        if (!user) return { success: false, error: 'Email не найден' };
        if (user.password !== password) return { success: false, error: 'Неверный пароль' };
        return { success: true, user };
    }
    
    function getUserChats(email) { const c = localStorage.getItem(`pep_chats_${email}`); return c ? JSON.parse(c) : {}; }
    function saveUserChats(email, uc) { localStorage.setItem(`pep_chats_${email}`, JSON.stringify(uc)); }
    
    // ========== AI ВЫЗОВ ==========
    const HF_URL = "https://api-inference.huggingface.co/models/microsoft/DialoGPT-medium";
    
    async function callAI(message, history) {
        try {
            let context = [];
            for (let i = Math.max(0, history.length-8); i < history.length; i++)
                if (history[i].role === 'user') context.push(history[i].content);
            context.push(message);
            
            const resp = await fetch(HF_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ inputs: { text: context.join(" ") }, parameters: { max_length: 200, temperature: 0.8 } })
            });
            if (!resp.ok) {
                if (resp.status === 503) return "🔄 Модель загружается... Подожди немного!";
                throw new Error();
            }
            const data = await resp.json();
            let reply = data.generated_text || data[0]?.generated_text;
            if (reply && reply.includes(context.join(" "))) reply = reply.replace(context.join(" "), "").trim();
            if (!reply || reply.length < 2) reply = "Расскажи подробнее! 😊";
            return reply;
        } catch(e) { return "✨ Я здесь! Напиши что-нибудь ещё."; }
    }
    
    // ========== ЛОГИКА ЧАТА ==========
    function createNewChat() {
        if (!currentUser) return;
        const cid = Date.now().toString();
        currentChatId = cid;
        chats[cid] = { id: cid, title: `Чат ${new Date().toLocaleString()}`, created: Date.now(), messages: [{ role: 'bot', content: 'Чем могу помочь? 😊' }] };
        saveUserChats(currentUser.email, chats);
        renderChatList();
        renderCurrentChat();
    }
    
    function loadChat(cid) { if (!chats[cid]) return; currentChatId = cid; renderCurrentChat(); renderChatList(); }
    
    function deleteChat(cid) {
        if (confirm('Удалить чат?')) {
            delete chats[cid];
            saveUserChats(currentUser.email, chats);
            const ids = Object.keys(chats);
            if (ids.length) loadChat(ids[0]);
            else createNewChat();
            renderChatList();
        }
    }
    
    function renderChatList() {
        const cont = document.getElementById('chatList');
        if (!cont) return;
        cont.innerHTML = '';
        const sorted = Object.values(chats).sort((a,b)=>b.created - a.created);
        sorted.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
            div.innerHTML = `<div class="chat-title">${escapeHtml(chat.title.substring(0,35))}</div><div class="chat-date">${new Date(chat.created).toLocaleString()}</div>`;
            div.onclick = () => loadChat(chat.id);
            div.oncontextmenu = (e) => { e.preventDefault(); deleteChat(chat.id); };
            cont.appendChild(div);
        });
    }
    
    function renderCurrentChat() {
        if (!currentChatId || !chats[currentChatId]) return;
        const cont = document.getElementById('chatMessagesArea');
        const chat = chats[currentChatId];
        cont.innerHTML = '';
        chat.messages.forEach(msg => addMessageToUI(msg.role, msg.content, false));
        if (chat.messages.length > 1 && chat.title.startsWith('Чат ')) {
            const first = chat.messages.find(m => m.role === 'user');
            if (first) { chat.title = first.content.substring(0,30)+'...'; saveUserChats(currentUser.email, chats); renderChatList(); }
        }
    }
    
    function addMessageToUI(role, text, save=true) {
        const cont = document.getElementById('chatMessagesArea');
        const div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user' : 'bot'}`;
        div.innerHTML = `<div class="avatar ${role === 'user' ? 'avatar-user' : 'avatar-bot'}">${role === 'user' ? '👤' : '🧠'}</div><div class="bubble ${role === 'user' ? 'bubble-user' : 'bubble-bot'}">${escapeHtml(text)}</div>`;
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
        if (save && currentChatId && chats[currentChatId]) { chats[currentChatId].messages.push({ role, content: text }); saveUserChats(currentUser.email, chats); }
    }
    
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    function showTyping() { const c = document.getElementById('chatMessagesArea'); const d = document.createElement('div'); d.className = 'message bot'; d.id = 'typingIndicator'; d.innerHTML = `<div class="avatar avatar-bot">🧠</div><div class="bubble bubble-bot typing-indicator"><span></span><span></span><span></span></div>`; c.appendChild(d); c.scrollTop = c.scrollHeight; }
    function removeTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }
    
    async function sendMessage() {
        if (isLoading || !currentUser || !currentChatId) return;
        const inp = document.getElementById('chatInput');
        const text = inp.value.trim();
        if (!text) return;
        inp.value = ''; inp.style.height = 'auto';
        addMessageToUI('user', text, true);
        isLoading = true;
        document.getElementById('chatSendBtn').disabled = true;
        showTyping();
        try {
            removeTyping();
            const cont = document.getElementById('chatMessagesArea');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.id = 'streamingMessage';
            msgDiv.innerHTML = `<div class="avatar avatar-bot">🧠</div><div class="bubble bubble-bot" id="streamBubble">🤔 Думаю...</div>`;
            cont.appendChild(msgDiv);
            const bubble = document.getElementById('streamBubble');
            const reply = await callAI(text, chats[currentChatId].messages);
            if (bubble) bubble.innerText = reply;
            msgDiv.removeAttribute('id');
            if (currentChatId && chats[currentChatId]) { chats[currentChatId].messages.push({ role: 'bot', content: reply }); saveUserChats(currentUser.email, chats); }
        } catch(err) { removeTyping(); const errDiv = document.getElementById('streamingMessage'); if(errDiv) errDiv.remove(); addMessageToUI('bot', '✨ Давай продолжим!', true); }
        finally { isLoading = false; document.getElementById('chatSendBtn').disabled = false; inp.focus(); }
    }
    
    // ========== ПЕРЕКЛЮЧЕНИЕ МЕЖДУ СТРАНИЦАМИ ==========
    function showAuthPage() {
        document.getElementById('authPage').style.display = 'flex';
        document.getElementById('chatPage').style.display = 'none';
    }
    
    function showChatPage() {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('chatPage').style.display = 'block';
    }
    
    function clearAuthErrors() {
        ['loginEmail', 'loginPassword', 'regName', 'regEmail', 'regPassword'].forEach(id => {
            const input = document.getElementById(id);
            if (input) input.classList.remove('error');
            const errorSpan = document.getElementById(id + 'Error');
            if (errorSpan) errorSpan.innerText = '';
        });
    }
    
    function setFieldError(id, message) {
        const input = document.getElementById(id);
        if (input) input.classList.add('error');
        const errorSpan = document.getElementById(id + 'Error');
        if (errorSpan) errorSpan.innerText = message;
    }
    
    // ========== ЛОГИН ==========
    function handleLogin() {
        clearAuthErrors();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        let hasError = false;
        
        if (!email) { setFieldError('loginEmail', 'Введите email'); hasError = true; }
        else if (!validateEmail(email)) { setFieldError('loginEmail', 'Неверный формат email'); hasError = true; }
        if (!password) { setFieldError('loginPassword', 'Введите пароль'); hasError = true; }
        if (hasError) return;
        
        const res = loginUser(email, password);
        if (res.success) {
            currentUser = res.user;
            chats = getUserChats(email);
            currentChatId = null;
            document.getElementById('chatUserName').innerText = currentUser.name;
            document.getElementById('chatUserEmail').innerText = currentUser.email;
            renderChatList();
            const ids = Object.keys(chats);
            if (ids.length) loadChat(ids[0]);
            else createNewChat();
            showChatPage();
        } else {
            if (res.error === 'Email не найден') setFieldError('loginEmail', res.error);
            else if (res.error === 'Неверный пароль') setFieldError('loginPassword', res.error);
            else alert(res.error);
        }
    }
    
    // ========== РЕГИСТРАЦИЯ ==========
    function handleRegister() {
        clearAuthErrors();
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        let hasError = false;
        
        if (!name) { setFieldError('regName', 'Введите имя'); hasError = true; }
        if (!email) { setFieldError('regEmail', 'Введите email'); hasError = true; }
        else if (!validateEmail(email)) { setFieldError('regEmail', 'Неверный формат email'); hasError = true; }
        if (!password) { setFieldError('regPassword', 'Введите пароль'); hasError = true; }
        else if (password.length < 4) { setFieldError('regPassword', 'Пароль должен быть не менее 4 символов'); hasError = true; }
        if (hasError) return;
        
        const res = registerUser(name, email, password);
        if (res.success) {
            alert('✅ Аккаунт создан! Теперь войдите.');
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = '';
            showLoginForm();
        } else {
            if (res.error === 'Email уже зарегистрирован') setFieldError('regEmail', res.error);
            else if (res.error === 'Неверный формат email') setFieldError('regEmail', res.error);
            else if (res.error === 'Пароль должен быть не менее 4 символов') setFieldError('regPassword', res.error);
            else alert(res.error);
        }
    }
    
    function showLoginForm() {
        document.getElementById('authTitle').innerText = 'Вход';
        document.getElementById('loginFormFields').style.display = 'block';
        document.getElementById('registerFormFields').style.display = 'none';
        clearAuthErrors();
    }
    
    function showRegisterForm() {
        document.getElementById('authTitle').innerText = 'Регистрация';
        document.getElementById('loginFormFields').style.display = 'none';
        document.getElementById('registerFormFields').style.display = 'block';
        clearAuthErrors();
    }
    
    function logout() {
        currentUser = null;
        currentChatId = null;
        chats = {};
        showAuthPage();
        showLoginForm();
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    document.getElementById('doLoginBtn').onclick = handleLogin;
    document.getElementById('doRegisterBtn').onclick = handleRegister;
    document.getElementById('showRegisterBtn').onclick = showRegisterForm;
    document.getElementById('showLoginBtn').onclick = showLoginForm;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('exitLogoutBtn').onclick = logout;
    document.getElementById('newChatBtn').onclick = createNewChat;
    document.getElementById('chatSendBtn').onclick = sendMessage;
    
    const chatInput = document.getElementById('chatInput');
    chatInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    chatInput.oninput = function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; };
    
    showAuthPage();
    showLoginForm();
</script>
</body>
</html>
