<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PEP ULTRA — Математика • Код • Логика</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f7fb;min-height:100vh;color:#1a1a2e}
        .auth-page{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:20px}
        .auth-card{background:#fff;border-radius:32px;padding:40px 32px;max-width:450px;width:100%;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);animation:fadeInUp 0.5s}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .auth-logo{text-align:center;margin-bottom:32px}
        .auth-logo-img{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:16px;border:3px solid #667eea}
        .auth-logo h1{font-size:2rem;color:#1a1a2e}
        .auth-logo p{color:#868e96;font-size:0.85rem;margin-top:6px}
        .auth-title{font-size:1.5rem;font-weight:600;margin-bottom:24px;text-align:center;color:#1a1a2e}
        .form-group{margin-bottom:20px}
        .form-label{font-size:0.75rem;font-weight:600;color:#495057;margin-bottom:8px;display:block;text-transform:uppercase}
        .form-input{width:100%;padding:14px 16px;background:#f8f9fa;border:1px solid #e9ecef;border-radius:14px;font-size:1rem;outline:none;transition:all 0.2s}
        .form-input:focus{border-color:#667eea;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
        .form-input.error{border-color:#e03131;background:#fff5f5}
        .error-text{color:#e03131;font-size:0.7rem;margin-top:6px;display:block}
        .btn{width:100%;padding:14px;background:#1a1a2e;color:#fff;border:none;border-radius:14px;font-size:1rem;font-weight:600;cursor:pointer;transition:0.2s}
        .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 25px -5px rgba(102,126,234,0.4)}
        .switch-link{text-align:center;margin-top:24px;font-size:0.85rem;color:#868e96;cursor:pointer}
        .switch-link span{color:#667eea;font-weight:600}
        .chat-page{display:none;height:100vh;width:100%;background:#f5f7fb}
        .chat-container{display:flex;height:100%;width:100%}
        .sidebar{width:300px;background:#fff;border-right:1px solid #e8ecf0;display:flex;flex-direction:column;overflow-y:auto}
        .logo-area{padding:24px 20px;text-align:center;border-bottom:1px solid #eef2f6}
        .logo-area-img{width:55px;height:55px;border-radius:50%;object-fit:cover;margin-bottom:12px}
        .logo-area h2{font-size:1.4rem;font-weight:700;color:#1a1a2e}
        .user-card{background:#f8f9fa;border-radius:16px;padding:16px;margin:16px}
        .user-name{font-weight:700;font-size:1rem;color:#1a1a2e}
        .user-email{font-size:0.7rem;color:#868e96;margin-top:4px}
        .new-chat-btn,.logout-btn{margin:0 16px 12px 16px;width:calc(100% - 32px)}
        .new-chat-btn{background:#f1f3f5;color:#1a1a2e}
        .logout-btn{background:#fff5f5;color:#e03131;border:1px solid #ffe3e3}
        .chat-list{flex:1;overflow-y:auto;padding:12px}
        .chat-item{background:#f8f9fa;border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;transition:0.2s}
        .chat-item:hover{background:#f1f3f5}
        .chat-item.active{background:#e3f2fd;border-left:3px solid #667eea}
        .chat-title{font-size:0.85rem;font-weight:500}
        .chat-date{font-size:0.65rem;color:#adb5bd;margin-top:4px}
        .main-chat{flex:1;display:flex;flex-direction:column;background:#fff}
        .chat-header{padding:16px 24px;border-bottom:1px solid #eef2f6}
        .model-badge{display:inline-block;padding:6px 14px;background:#e3f2fd;border-radius:30px;font-size:0.7rem;color:#667eea;font-weight:500}
        .messages-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
        .message{display:flex;gap:10px;animation:fadeIn 0.2s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .message.user{justify-content:flex-end}
        .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
        .avatar-user{background:#1a1a2e;color:#fff}
        .avatar-bot{background:#e9ecef;color:#495057}
        .bubble{padding:10px 16px;border-radius:18px;max-width:70%;line-height:1.45;font-size:0.9rem;white-space:pre-wrap;word-break:break-word}
        .bubble-user{background:#1a1a2e;color:#fff;border-bottom-right-radius:4px}
        .bubble-bot{background:#f1f3f5;color:#212529;border-bottom-left-radius:4px}
        .input-area{padding:16px 24px 24px;background:#fff;border-top:1px solid #eef2f6}
        .input-wrapper{display:flex;gap:12px;align-items:flex-end}
        .message-input{flex:1;background:#f8f9fa;border:1px solid #e9ecef;border-radius:24px;padding:12px 18px;font-family:inherit;font-size:0.95rem;resize:none;outline:none;max-height:120px}
        .message-input:focus{border-color:#667eea;background:#fff}
        .send-btn{background:linear-gradient(135deg,#667eea,#764ba2);padding:12px 24px;border-radius:24px;width:auto}
        .status-bar{padding:8px 24px;background:#f8f9fa;border-top:1px solid #eef2f6;font-size:0.65rem;color:#868e96;text-align:center}
        @media (max-width:768px){.sidebar{width:260px}.bubble{max-width:85%}.auth-card{padding:32px 24px}}
    </style>
</head>
<body>

<!-- СТРАНИЦА РЕГИСТРАЦИИ -->
<div id="authPage" class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23667eea'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='40' font-weight='bold'%3E🐧%3C/text%3E%3C/svg%3E" class="auth-logo-img">
            <h1>PEP ULTRA</h1>
            <p>математика • код • логика</p>
        </div>
        <div class="auth-title" id="authTitle">Вход</div>
        <div id="loginFormFields">
            <div class="form-group"><label class="form-label">EMAIL</label><input type="email" id="loginEmail" class="form-input" placeholder="your@email.com"><span class="error-text" id="loginEmailError"></span></div>
            <div class="form-group"><label class="form-label">ПАРОЛЬ</label><input type="password" id="loginPassword" class="form-input" placeholder="••••••"><span class="error-text" id="loginPasswordError"></span></div>
            <button id="doLoginBtn" class="btn btn-primary">🔐 Войти</button>
            <div class="switch-link" id="showRegisterBtn">Нет аккаунта? <span>Зарегистрироваться</span></div>
        </div>
        <div id="registerFormFields" style="display:none">
            <div class="form-group"><label class="form-label">ИМЯ</label><input type="text" id="regName" class="form-input" placeholder="Алексей"><span class="error-text" id="regNameError"></span></div>
            <div class="form-group"><label class="form-label">EMAIL</label><input type="email" id="regEmail" class="form-input" placeholder="your@email.com"><span class="error-text" id="regEmailError"></span></div>
            <div class="form-group"><label class="form-label">ПАРОЛЬ</label><input type="password" id="regPassword" class="form-input" placeholder="••••••"><span class="error-text" id="regPasswordError"></span></div>
            <button id="doRegisterBtn" class="btn btn-primary">📝 Зарегистрироваться</button>
            <div class="switch-link" id="showLoginBtn">Уже есть аккаунт? <span>Войти</span></div>
        </div>
    </div>
</div>

<!-- СТРАНИЦА ЧАТА -->
<div id="chatPage" class="chat-page">
    <div class="chat-container">
        <div class="sidebar">
            <div class="logo-area"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23667eea'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='40' font-weight='bold'%3E🐧%3C/text%3E%3C/svg%3E" class="logo-area-img"><h2>PEP</h2></div>
            <div class="user-card"><div class="user-name" id="chatUserName"></div><div class="user-email" id="chatUserEmail"></div></div>
            <button id="newChatBtn" class="btn new-chat-btn">+ Новый чат</button>
            <button id="exitLogoutBtn" class="btn logout-btn">Выйти</button>
            <div class="chat-list" id="chatList"></div>
        </div>
        <div class="main-chat">
            <div class="chat-header"><div class="model-badge">🧠 PEP ULTRA • Решает задачи • Пишет код</div></div>
            <div class="messages-area" id="chatMessagesArea"><div class="message bot"><div class="avatar avatar-bot">🧠</div><div class="bubble bubble-bot">Привет! Я PEP ULTRA. Решаю задачи, пишу код, отвечаю на вопросы — мгновенно! 🔥</div></div></div>
            <div class="input-area"><div class="input-wrapper"><textarea id="chatInput" class="message-input" rows="1" placeholder="Напиши сообщение..."></textarea><button id="chatSendBtn" class="btn send-btn">Отправить</button></div></div>
            <div class="status-bar">🟢 Онлайн • Решаю задачи • Мгновенные ответы</div>
        </div>
    </div>
</div>

<script>
    // ========== 1. ПОЛЬЗОВАТЕЛИ ==========
    let currentUser = null, currentChatId = null, chats = {}, isLoading = false;
    function getUsers() { const u = localStorage.getItem('pep_users_db'); return u ? JSON.parse(u) : {}; }
    function saveUsers(u) { localStorage.setItem('pep_users_db', JSON.stringify(u)); }
    function validateEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
    function registerUser(name, email, password) {
        const users = getUsers();
        if (!validateEmail(email)) return { success: false, error: 'Неверный формат email' };
        if (users[email]) return { success: false, error: 'Email уже зарегистрирован' };
        if (password.length < 4) return { success: false, error: 'Пароль не менее 4 символов' };
        if (!name.trim()) return { success: false, error: 'Введите имя' };
        users[email] = { name: name.trim(), email, password, created: Date.now() };
        saveUsers(users);
        return { success: true };
    }
    function loginUser(email, password) {
        const users = getUsers();
        if (!validateEmail(email)) return { success: false, error: 'Неверный формат email' };
        const user = users[email];
        if (!user) return { success: false, error: 'Email не найден' };
        if (user.password !== password) return { success: false, error: 'Неверный пароль' };
        return { success: true, user };
    }
    function getUserChats(email) { const c = localStorage.getItem(`pep_chats_${email}`); return c ? JSON.parse(c) : {}; }
    function saveUserChats(email, uc) { localStorage.setItem(`pep_chats_${email}`, JSON.stringify(uc)); }
    
    // ========== 2. ГЛАВНАЯ ФУНКЦИЯ ОТВЕТОВ (РАСПОЗНАЁТ МАТЕМАТИКУ, ЗАДАЧИ, КОД) ==========
    function getAIResponse(message) {
        const msg = message.toLowerCase().trim();
        
        // --------------------------------------------------------------
        // БЛОК 1: МАТЕМАТИЧЕСКИЕ ЗАДАЧИ (НАЧАЛЬНАЯ ШКОЛА, ЛОГИКА, УРАВНЕНИЯ)
        // --------------------------------------------------------------
        
        // Задача про флажки: "Пети 4 флажка, а у Вани на 3 флажка больше. Сколько флажков у Вани?"
        if (msg.match(/пети|петя|вани|ваня|флажков|флажка|больше|меньше|сколько|флажк/i)) {
            // Извлекаем числа из текста
            const numbers = message.match(/\d+/g);
            if (numbers && numbers.length >= 2) {
                const num1 = parseInt(numbers[0]);
                const num2 = parseInt(numbers[1]);
                if (msg.includes('больше')) {
                    const result = num1 + num2;
                    return `📐 **Решение задачи:**\n\nУ Пети ${num1} флажка, а у Вани на ${num2} флажка больше.\n\n${num1} + ${num2} = ${result}\n\n✅ **Ответ:** У Вани ${result} флажков.`;
                }
                if (msg.includes('меньше')) {
                    const result = num1 - num2;
                    return `📐 **Решение задачи:**\n\n${num1} - ${num2} = ${result}\n\n✅ **Ответ:** ${result}`;
                }
            }
        }
        
        // Простые арифметические примеры: 2+2, 5*3, 10/2, 15-7
        const mathMatch = message.match(/(\d+)\s*([+\-*/])\s*(\d+)/);
        if (mathMatch) {
            const a = parseFloat(mathMatch[1]);
            const op = mathMatch[2];
            const b = parseFloat(mathMatch[3]);
            let result;
            switch(op) {
                case '+': result = a + b; break;
                case '-': result = a - b; break;
                case '*': result = a * b; break;
                case '/': result = b !== 0 ? a / b : 'деление на ноль невозможно'; break;
                default: result = '?';
            }
            return `🧮 **Вычисление:** ${a} ${op} ${b} = **${result}**`;
        }
        
        // Задачи на умножение/деление в тексте
        if (msg.match(/сколько будет|посчитай|вычисли|найди значение/i) && mathMatch) {
            const a = parseFloat(mathMatch[1]), op = mathMatch[2], b = parseFloat(mathMatch[3]);
            let result;
            switch(op) {
                case '+': result = a + b; break;
                case '-': result = a - b; break;
                case '*': result = a * b; break;
                case '/': result = b !== 0 ? a / b : 'деление на ноль невозможно'; break;
                default: result = '?';
            }
            return `🧮 **Результат:** ${a} ${op} ${b} = **${result}**`;
        }
        
        // Уравнения вида "x + 5 = 10" или "x * 3 = 15"
        const equationMatch = message.match(/[хx]\s*([+\-*/])\s*(\d+)\s*=\s*(\d+)/);
        if (equationMatch) {
            const op = equationMatch[1];
            const b = parseFloat(equationMatch[2]);
            const c = parseFloat(equationMatch[3]);
            let x;
            switch(op) {
                case '+': x = c - b; break;
                case '-': x = c + b; break;
                case '*': x = c / b; break;
                case '/': x = c * b; break;
                default: x = '?';
            }
            return `📐 **Решение уравнения:** x ${op} ${b} = ${c}\n\n✅ **Ответ:** x = ${x}`;
        }
        
        // Задачи на логику: "Что тяжелее 1 кг пуха или 1 кг железа?"
        if (msg.match(/тяжелее|легче|пух|железо|кг|килограмм/i) && (msg.includes('пух') || msg.includes('железо'))) {
            return "🎯 **Логическая задача:** Что тяжелее: 1 кг пуха или 1 кг железа?\n\n✅ **Ответ:** Они весят одинаково — по 1 кг. Но это классическая задача на внимательность! 😄";
        }
        
        // Задачи на скорость, время, расстояние
        if (msg.match(/скорость|время|расстояние|км|час|минут/i)) {
            const numbers = message.match(/\d+/g);
            if (numbers && numbers.length >= 2) {
                return `📐 **Задача на движение:**\n\nСкорость, время и расстояние связаны формулой: S = v × t\n\nЧисла в задаче: ${numbers.join(', ')}\n\nПодставь их в формулу и получишь ответ. Напиши точные условия — решу подробно! 🚗`;
            }
        }
        
        // --------------------------------------------------------------
        // БЛОК 2: КОД И ПРОГРАММИРОВАНИЕ
        // --------------------------------------------------------------
        if (msg.match(/код|python|питон|javascript|js|html|css|функция|класс|алгоритм|программа|напиши код/i)) {
            if (msg.includes('калькулятор')) {
                return "```python\n# Калькулятор на Python\ndef calculator():\n    print('Калькулятор запущен!')\n    a = float(input('Введите первое число: '))\n    op = input('Введите операцию (+, -, *, /): ')\n    b = float(input('Введите второе число: '))\n    \n    if op == '+':\n        print(f'{a} + {b} = {a + b}')\n    elif op == '-':\n        print(f'{a} - {b} = {a - b}')\n    elif op == '*':\n        print(f'{a} * {b} = {a * b}')\n    elif op == '/':\n        if b != 0:\n            print(f'{a} / {b} = {a / b}')\n        else:\n            print('Ошибка: деление на ноль')\n    else:\n        print('Неверная операция')\n\ncalculator()\n```\n\nЭто простой калькулятор. Могу написать калькулятор с графическим интерфейсом или научный калькулятор! 🔢";
            }
            return "```python\n# Пример кода на Python\ndef solve_problem(question):\n    # Здесь мог бы быть твой код\n    print('PEP ULTRA помогает писать код!')\n    return 'Готово!'\n\n# Использование\nresult = solve_problem('Твоя задача')\nprint(result)\n```\n\nКакой код нужен? Напиши подробнее — сгенерирую под твою задачу! 🚀";
        }
        
        // --------------------------------------------------------------
        // БЛОК 3: ПРИВЕТСТВИЯ И ОБЩИЕ ФРАЗЫ
        // --------------------------------------------------------------
        if (msg.match(/привет|здравствуй|хай|hello|hi|здарова|ку/i)) {
            return "Привет! 👋 Я PEP ULTRA. Решаю задачи, пишу код, отвечаю на вопросы — мгновенно! Напиши, что нужно сделать, и я помогу. 🔥";
        }
        if (msg.match(/как дела|как жизнь|как ты|как настроение/i)) {
            return "У меня всё отлично! 💪 Работаю на полную мощность, решаю задачи и отвечаю на вопросы. А у тебя как дела? 😊";
        }
        if (msg.match(/спасибо|благодарю|thank/i)) {
            return "Пожалуйста! 🤗 Рад был помочь. Обращайся ещё, я всегда здесь!";
        }
        if (msg.match(/помощь|help|что умеешь|возможности/i)) {
            return "⚡ **Что я умею:**\n\n• Решаю математические задачи (примеры, уравнения, логика)\n• Пишу код на Python, JavaScript, HTML/CSS\n• Отвечаю на вопросы\n• Помогаю с учёбой и работой\n• Шучу и поддерживаю разговор\n\n**Просто напиши, что нужно — и я помогу!** 🚀";
        }
        if (msg.match(/кто ты|ты кто|твое имя/i)) {
            return "Я PEP ULTRA — супер-быстрый AI помощник! 🤖\n\n• Решаю задачи по математике\n• Пишу код\n• Работаю 24/7\n• Отвечаю мгновенно\n\nЧем могу помочь прямо сейчас? 🔥";
        }
        if (msg.match(/пока|до свидания|увидимся|бай|bye/i)) {
            return "До встречи! 👋 Буду рад помочь снова. Заходи, если понадобятся решения задач или код!";
        }
        
        // --------------------------------------------------------------
        // БЛОК 4: УМНЫЙ ДЕФОЛТНЫЙ ОТВЕТ
        // --------------------------------------------------------------
        return `🤔 **Понял твой запрос!**\n\n📝 *Ты написал:* "${message}"\n\nЧто я могу сделать:\n1. 📐 **Решить задачу** — напиши условие чётко, и я дам ответ\n2. 💻 **Написать код** — укажи язык и задачу\n3. 📚 **Объяснить тему** — спроси, и я объясню простыми словами\n4. 🔍 **Помочь с логикой** — разберём вместе\n\n**Уточни, что именно нужно, и я сразу помогу!** ✨`;
    }
    
    // ========== 3. ЛОГИКА ЧАТА ==========
    function createNewChat() {
        if (!currentUser) return;
        const cid = Date.now().toString();
        currentChatId = cid;
        chats[cid] = { id: cid, title: `Чат ${new Date().toLocaleString()}`, created: Date.now(), messages: [{ role: 'bot', content: 'Привет! Я PEP ULTRA. Решаю задачи, пишу код, отвечаю на вопросы — мгновенно! 🔥' }] };
        saveUserChats(currentUser.email, chats);
        renderChatList();
        renderCurrentChat();
    }
    function loadChat(cid) { if (!chats[cid]) return; currentChatId = cid; renderCurrentChat(); renderChatList(); }
    function deleteChat(cid) {
        if (confirm('Удалить этот чат?')) {
            delete chats[cid];
            saveUserChats(currentUser.email, chats);
            const ids = Object.keys(chats);
            if (ids.length) loadChat(ids[0]);
            else createNewChat();
            renderChatList();
        }
    }
    function renderChatList() {
        const cont = document.getElementById('chatList');
        if (!cont) return;
        cont.innerHTML = '';
        const sorted = Object.values(chats).sort((a,b)=>b.created - a.created);
        sorted.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
            div.innerHTML = `<div class="chat-title">${escapeHtml(chat.title.substring(0,35))}</div><div class="chat-date">${new Date(chat.created).toLocaleString()}</div>`;
            div.onclick = () => loadChat(chat.id);
            div.oncontextmenu = (e) => { e.preventDefault(); deleteChat(chat.id); };
            cont.appendChild(div);
        });
    }
    function renderCurrentChat() {
        if (!currentChatId || !chats[currentChatId]) return;
        const cont = document.getElementById('chatMessagesArea');
        const chat = chats[currentChatId];
        cont.innerHTML = '';
        chat.messages.forEach(msg => addMessageToUI(msg.role, msg.content, false));
        if (chat.messages.length > 1 && chat.title.startsWith('Чат ')) {
            const first = chat.messages.find(m => m.role === 'user');
            if (first) { chat.title = first.content.substring(0,30)+'...'; saveUserChats(currentUser.email, chats); renderChatList(); }
        }
    }
    function addMessageToUI(role, text, save=true) {
        const cont = document.getElementById('chatMessagesArea');
        const div = document.createElement('div');
        div.className = `message ${role === 'user' ? 'user' : 'bot'}`;
        div.innerHTML = `<div class="avatar ${role === 'user' ? 'avatar-user' : 'avatar-bot'}">${role === 'user' ? '👤' : '🧠'}</div><div class="bubble ${role === 'user' ? 'bubble-user' : 'bubble-bot'}">${escapeHtml(text)}</div>`;
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
        if (save && currentChatId && chats[currentChatId]) { chats[currentChatId].messages.push({ role, content: text }); saveUserChats(currentUser.email, chats); }
    }
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    async function sendMessage() {
        if (isLoading || !currentUser || !currentChatId) return;
        const inp = document.getElementById('chatInput');
        const text = inp.value.trim();
        if (!text) return;
        inp.value = ''; inp.style.height = 'auto';
        addMessageToUI('user', text, true);
        isLoading = true;
        const sendBtn = document.getElementById('chatSendBtn');
        sendBtn.disabled = true;
        sendBtn.textContent = '...';
        const reply = getAIResponse(text);
        addMessageToUI('bot', reply, true);
        isLoading = false;
        sendBtn.disabled = false;
        sendBtn.textContent = 'Отправить';
        inp.focus();
    }
    
    // ========== 4. НАВИГАЦИЯ ==========
    function showAuthPage() { document.getElementById('authPage').style.display = 'flex'; document.getElementById('chatPage').style.display = 'none'; }
    function showChatPage() { document.getElementById('authPage').style.display = 'none'; document.getElementById('chatPage').style.display = 'block'; }
    function clearAuthErrors() { ['loginEmail','loginPassword','regName','regEmail','regPassword'].forEach(id => { const inp = document.getElementById(id); if(inp) inp.classList.remove('error'); const err = document.getElementById(id+'Error'); if(err) err.innerText = ''; }); }
    function setFieldError(id, msg) { const inp = document.getElementById(id); if(inp) inp.classList.add('error'); const err = document.getElementById(id+'Error'); if(err) err.innerText = msg; }
    function handleLogin() {
        clearAuthErrors();
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        let hasError = false;
        if (!email) { setFieldError('loginEmail', 'Введите email'); hasError = true; }
        else if (!validateEmail(email)) { setFieldError('loginEmail', 'Неверный формат email'); hasError = true; }
        if (!pwd) { setFieldError('loginPassword', 'Введите пароль'); hasError = true; }
        if (hasError) return;
        const res = loginUser(email, pwd);
        if (res.success) {
            currentUser = res.user;
            chats = getUserChats(email);
            currentChatId = null;
            document.getElementById('chatUserName').innerText = currentUser.name;
            document.getElementById('chatUserEmail').innerText = currentUser.email;
            renderChatList();
            const ids = Object.keys(chats);
            if (ids.length) loadChat(ids[0]);
            else createNewChat();
            showChatPage();
        } else {
            if (res.error === 'Email не найден') setFieldError('loginEmail', res.error);
            else if (res.error === 'Неверный пароль') setFieldError('loginPassword', res.error);
            else alert(res.error);
        }
    }
    function handleRegister() {
        clearAuthErrors();
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pwd = document.getElementById('regPassword').value;
        let hasError = false;
        if (!name) { setFieldError('regName', 'Введите имя'); hasError = true; }
        if (!email) { setFieldError('regEmail', 'Введите email'); hasError = true; }
        else if (!validateEmail(email)) { setFieldError('regEmail', 'Неверный формат email'); hasError = true; }
        if (!pwd) { setFieldError('regPassword', 'Введите пароль'); hasError = true; }
        else if (pwd.length < 4) { setFieldError('regPassword', 'Пароль не менее 4 символов'); hasError = true; }
        if (hasError) return;
        const res = registerUser(name, email, pwd);
        if (res.success) {
            alert('✅ Аккаунт создан! Теперь войдите.');
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = '';
            showLoginForm();
        } else {
            if (res.error === 'Email уже зарегистрирован') setFieldError('regEmail', res.error);
            else if (res.error === 'Неверный формат email') setFieldError('regEmail', res.error);
            else if (res.error === 'Пароль не менее 4 символов') setFieldError('regPassword', res.error);
            else alert(res.error);
        }
    }
    function showLoginForm() { document.getElementById('authTitle').innerText = 'Вход'; document.getElementById('loginFormFields').style.display = 'block'; document.getElementById('registerFormFields').style.display = 'none'; clearAuthErrors(); }
    function showRegisterForm() { document.getElementById('authTitle').innerText = 'Регистрация'; document.getElementById('loginFormFields').style.display = 'none'; document.getElementById('registerFormFields').style.display = 'block'; clearAuthErrors(); }
    function logout() { currentUser = null; currentChatId = null; chats = {}; showAuthPage(); showLoginForm(); document.getElementById('chatInput').value = ''; }
    
    // ========== 5. ЗАПУСК ==========
    document.getElementById('doLoginBtn').onclick = handleLogin;
    document.getElementById('doRegisterBtn').onclick = handleRegister;
    document.getElementById('showRegisterBtn').onclick = showRegisterForm;
    document.getElementById('showLoginBtn').onclick = showLoginForm;
    document.getElementById('exitLogoutBtn').onclick = logout;
    document.getElementById('newChatBtn').onclick = createNewChat;
    document.getElementById('chatSendBtn').onclick = sendMessage;
    const chatInput = document.getElementById('chatInput');
    chatInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    chatInput.oninput = function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; };
    showAuthPage();
    showLoginForm();
</script>
</body>
</html>
